groups:
  - name: autoscale_alerts
    rules:
      - alert: HighCPUUsage
        expr: >-
          100 - (avg(rate(node_cpu_seconds_total
          {mode="idle"}[2m])) * 100) > 75
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'CPU usage exceeds 75%'

      - alert: HighMemoryUsage
        expr: >-
          (1 - node_memory_MemAvailable_bytes /
          node_memory_MemTotal_bytes) * 100 > 75
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Memory usage exceeds 75%'
